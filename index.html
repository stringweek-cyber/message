<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>담임전달사항</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .completed { text-decoration: line-through; opacity: 0.45; }

        /* 날짜별 진행 링 */
        .progress-ring-container {
            position: relative;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .progress-ring-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform: rotate(-90deg);
        }
        .progress-ring-bg {
            fill: none;
            stroke: #e2e8f0;
            stroke-width: 2.5;
        }
        .progress-ring-fill {
            fill: none;
            stroke: #22c55e;
            stroke-width: 2.5;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.4s ease;
        }
        .progress-ring-fill.all-done {
            stroke: #16a34a;
        }
        .day-num {
            font-size: 13px;
            line-height: 1;
            position: relative;
            z-index: 1;
        }
        .dot-indicator {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #ef4444;
            margin: 1px auto 0;
        }
        .dot-indicator.white { background: white; }
        .dot-spacer { height: 5px; }

        /* 선택된 날짜 */
        .day-selected .progress-ring-svg { display: none; }
        .day-selected .day-num-wrap {
            width: 40px;
            height: 40px;
            background: #4f46e5;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
        }
        .day-selected .day-num { color: white; font-weight: 700; font-size: 14px; }
        .day-selected .dot-indicator { background: white; }
        .day-selected .today-label { color: white; display: block; }

        /* 오늘 날짜 강조 - 배경 원 */
        .day-today:not(.day-selected) .day-num-wrap {
            width: 40px;
            height: 40px;
            background: #4f46e5;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
        }
        .day-today:not(.day-selected) .day-num { color: white !important; font-weight: 700; font-size: 14px; }
        .day-today:not(.day-selected) .dot-indicator { background: white; }
        .today-label {
            font-size: 9px;
            font-weight: 700;
            color: white;
            line-height: 1;
            letter-spacing: -0.2px;
        }

        /* 사이드 드로어 */
        #drawer-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            z-index: 100; opacity: 0; pointer-events: none;
            transition: opacity 0.25s;
        }
        #drawer-overlay.open { opacity: 1; pointer-events: all; }
        #drawer {
            position: fixed; top: 0; left: -320px; width: 320px; height: 100vh;
            background: white; z-index: 101; box-shadow: 4px 0 24px rgba(0,0,0,0.12);
            transition: left 0.28s cubic-bezier(.4,0,.2,1);
            display: flex; flex-direction: column;
        }
        #drawer.open { left: 0; }
        #drawer-content { flex: 1; overflow-y: auto; padding: 16px; }
        
        /* 수정 모달 */
        #edit-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.45);
            z-index: 200; display: none; align-items: center; justify-content: center;
            padding: 16px;
        }
        #edit-modal.open { display: flex; }
        #edit-modal-box {
            background: white; border-radius: 20px; padding: 24px;
            width: 100%; max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }

        /* 슬라이드 애니메이션 */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .memo-item { animation: slideUp 0.2s ease forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col overflow-hidden">

    <!-- 드로어 오버레이 -->
    <div id="drawer-overlay" onclick="closeDrawer()"></div>

    <!-- 사이드 드로어 -->
    <div id="drawer">
        <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100">
            <h2 class="text-lg font-bold text-indigo-600">전달사항 내보내기</h2>
            <button onclick="closeDrawer()" class="text-slate-400 hover:text-slate-600 p-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div>
        <div id="drawer-content">
            <!-- 이메일 전송 -->
            <div class="mb-5">
                <p class="text-sm font-semibold text-slate-600 mb-2">📧 이메일로 전송</p>
                <input type="email" id="email-input" placeholder="이메일 주소 입력" 
                    class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-400 outline-none mb-2">
                <button onclick="sendEmail()" 
                    class="w-full bg-indigo-600 text-white rounded-xl py-2.5 text-sm font-semibold active:scale-95 transition-transform">
                    이메일 전송
                </button>
            </div>
            <hr class="border-slate-100 mb-5">
            <!-- 전체 복사 -->
            <div class="mb-5">
                <p class="text-sm font-semibold text-slate-600 mb-2">📋 전체 내용 복사</p>
                <button onclick="copyAll()" 
                    class="w-full bg-slate-100 text-slate-700 rounded-xl py-2.5 text-sm font-semibold hover:bg-slate-200 active:scale-95 transition-all">
                    클립보드에 복사
                </button>
            </div>
            <hr class="border-slate-100 mb-4">
            <!-- 미리보기 -->
            <div>
                <p class="text-sm font-semibold text-slate-600 mb-2">📄 내용 미리보기</p>
                <div id="export-preview" class="bg-slate-50 rounded-xl p-3 text-xs text-slate-600 whitespace-pre-wrap leading-relaxed max-h-80 overflow-y-auto border border-slate-100"></div>
            </div>
        </div>
    </div>

    <!-- 수정 모달 -->
    <div id="edit-modal">
        <div id="edit-modal-box">
            <h3 class="text-base font-bold text-slate-800 mb-4">전달사항 수정</h3>
            <textarea id="edit-text-input" rows="3"
                class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-400 outline-none resize-none mb-3"></textarea>
            <div class="mb-4">
                <div class="flex items-center justify-between mb-1.5">
                    <label class="text-xs font-semibold text-slate-500">날짜 변경 (다른 날로 이동)</label>
                    <div class="flex items-center gap-1">
                        <button onclick="shiftEditDate(-1)" class="w-7 h-7 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-500 active:scale-95 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                        </button>
                        <button onclick="shiftEditDate(1)" class="w-7 h-7 rounded-lg bg-indigo-100 hover:bg-indigo-200 flex items-center justify-center text-indigo-600 active:scale-95 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                        </button>
                    </div>
                </div>
                <!-- 숨겨진 실제 date input -->
                <input type="date" id="edit-date-input" class="sr-only" onchange="updateDateDisplay()">
                <!-- 보여주는 날짜 표시 -->
                <div id="edit-date-display" onclick="document.getElementById('edit-date-input').showPicker()"
                    class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-700 bg-white cursor-pointer flex items-center justify-between hover:border-indigo-400 transition-colors">
                    <span id="edit-date-text">날짜 선택</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-400"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="closeEditModal()" 
                    class="flex-1 bg-slate-100 text-slate-600 rounded-xl py-2.5 text-sm font-semibold">취소</button>
                <button onclick="saveEdit()" 
                    class="flex-1 bg-indigo-600 text-white rounded-xl py-2.5 text-sm font-semibold">저장</button>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-4 py-3.5 flex items-center shrink-0">
        <button onclick="openDrawer()" class="mr-3 p-1.5 text-slate-500 hover:text-indigo-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
        <h1 class="text-xl font-bold text-indigo-600 flex-1">담임전달사항</h1>
        <div id="current-month-display" class="font-semibold text-slate-700 text-base">2026.04</div>
    </header>

    <!-- Calendar Section -->
    <section class="bg-white px-3 pb-3 pt-2 shadow-sm shrink-0">
        <!-- 요일 헤더 + 네비게이션 -->
        <div class="flex items-center mb-1">
            <button onclick="changeMonth(-1)" class="p-2 text-slate-400 hover:text-indigo-600 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <!-- 요일 헤더: 버튼 너비 제외하고 7등분 -->
            <div class="calendar-grid flex-1 text-center">
                <div class="text-xs font-bold text-red-500 py-1">일</div>
                <div class="text-xs font-bold text-slate-500 py-1">월</div>
                <div class="text-xs font-bold text-slate-500 py-1">화</div>
                <div class="text-xs font-bold text-slate-500 py-1">수</div>
                <div class="text-xs font-bold text-slate-500 py-1">목</div>
                <div class="text-xs font-bold text-slate-500 py-1">금</div>
                <div class="text-xs font-bold text-blue-500 py-1">토</div>
            </div>
            <button onclick="changeMonth(1)" class="p-2 text-slate-400 hover:text-indigo-600 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>
        </div>
        <!-- 날짜 그리드: 요일 헤더와 동일하게 좌우 패딩 맞춤 -->
        <div class="flex items-start">
            <div style="width:38px; shrink:0;"></div>
            <div id="calendar-days" class="calendar-grid flex-1 gap-y-1">
                <!-- JS inject -->
            </div>
            <div style="width:38px; shrink:0;"></div>
        </div>
    </section>

    <!-- Memo Section -->
    <main class="flex-1 flex flex-col overflow-hidden px-4 py-4 bg-slate-50">
        <div class="flex items-center justify-between mb-3 px-1">
            <h2 id="selected-date-title" class="text-base font-bold text-slate-800">날짜 선택</h2>
            <span class="text-xs text-slate-400">항목 탭 → 수정/이동</span>
        </div>
        <div id="memo-container" class="flex-1 overflow-y-auto no-scrollbar space-y-2.5 pb-24">
        </div>
    </main>

    <!-- Input Fixed Bottom -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 pb-6 flex gap-2 shadow-[0_-4px_16px_rgba(0,0,0,0.06)]">
        <input type="text" id="memo-input" placeholder="오늘의 전달사항을 입력하세요..." 
            class="flex-1 bg-slate-100 border-none rounded-2xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none text-sm transition-all">
        <button onclick="addMemo()" class="bg-indigo-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center active:scale-95 transition-transform shadow-lg shadow-indigo-200 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        </button>
    </div>

    <script>
        let currentDate = new Date();
        let selectedDate = new Date();
        let memos = JSON.parse(localStorage.getItem('teacher_daily_memos') || '{}');
        const DAY_NAMES = ['일','월','화','수','목','금','토'];

        // 수정 모달 상태
        let editingDateKey = null;
        let editingIndex = null;

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatDateKorean(dateStr) {
            const [y, m, d] = dateStr.split('-').map(Number);
            const dow = new Date(y, m - 1, d).getDay();
            return `${y}년 ${m}월 ${d}일(${DAY_NAMES[dow]})`;
        }

        // 진행률 링 SVG 생성
        function createProgressRing(total, done, isSelected, isToday, dayNum, dayOfWeek) {
            const size = 40;
            const radius = 17;
            const circumference = 2 * Math.PI * radius;
            const progress = total > 0 ? done / total : 0;
            const offset = circumference - progress * circumference;
            const allDone = total > 0 && done === total;

            let numColor = 'text-slate-600';
            if (dayOfWeek === 0) numColor = 'text-red-500';
            else if (dayOfWeek === 6) numColor = 'text-blue-500';

            const selectedClass = isSelected ? 'day-selected' : '';
            const todayClass = isToday && !isSelected ? 'day-today' : '';
            const hasMemo = total > 0;

            return `
                <div class="progress-ring-container ${selectedClass} ${todayClass}" onclick="selectDay(${dayNum})">
                    ${hasMemo && !isSelected && !isToday ? `
                    <svg class="progress-ring-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
                        <circle class="progress-ring-bg" cx="${size/2}" cy="${size/2}" r="${radius}"/>
                        <circle class="progress-ring-fill ${allDone ? 'all-done' : ''}" cx="${size/2}" cy="${size/2}" r="${radius}"
                            stroke-dasharray="${circumference}"
                            stroke-dashoffset="${offset}"/>
                    </svg>` : ''}
                    ${(isSelected || isToday) ? `
                    <div class="day-num-wrap">
                        ${isToday ? '<span class="today-label">오늘</span>' : ''}
                        <span class="day-num">${dayNum}</span>
                        ${hasMemo ? '<div class="dot-indicator white"></div>' : '<div class="dot-spacer"></div>'}
                    </div>
                    ` : `
                    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;">
                        <span class="day-num ${numColor}">${dayNum}</span>
                        ${hasMemo ? '<div class="dot-indicator"></div>' : '<div class="dot-spacer"></div>'}
                    </div>
                    `}
                </div>
            `;
        }

        function renderCalendar() {
            const daysContainer = document.getElementById('calendar-days');
            const monthDisplay = document.getElementById('current-month-display');
            daysContainer.innerHTML = '';
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            monthDisplay.innerText = `${year}.${String(month + 1).padStart(2, '0')}`;

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.style.height = '44px';
                daysContainer.appendChild(empty);
            }

            const todayKey = formatDate(new Date());

            for (let i = 1; i <= lastDate; i++) {
                const dateObj = new Date(year, month, i);
                const dayOfWeek = dateObj.getDay();
                const dateKey = formatDate(dateObj);
                const isSelected = formatDate(selectedDate) === dateKey;
                const isToday = todayKey === dateKey;
                const dayMemos = memos[dateKey] || [];
                const total = dayMemos.length;
                const done = dayMemos.filter(m => m.done).length;

                const cell = document.createElement('div');
                cell.style.height = '44px';
                cell.style.display = 'flex';
                cell.style.alignItems = 'center';
                cell.style.justifyContent = 'center';
                cell.innerHTML = createProgressRing(total, done, isSelected, isToday, i, dayOfWeek);
                daysContainer.appendChild(cell);
            }
        }

        function selectDay(day) {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            selectedDate = new Date(year, month, day);
            renderCalendar();
            renderMemos();
        }

        function renderMemos() {
            const container = document.getElementById('memo-container');
            const title = document.getElementById('selected-date-title');
            const dateKey = formatDate(selectedDate);
            title.innerText = `${selectedDate.getFullYear()}년 ${selectedDate.getMonth() + 1}월 ${selectedDate.getDate()}일`;
            container.innerHTML = '';

            const dayMemos = memos[dateKey] || [];

            if (dayMemos.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-10 text-slate-300">
                        <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mb-2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                        <p class="text-sm">기록된 사항이 없습니다.</p>
                    </div>
                `;
                return;
            }

            dayMemos.forEach((memo, index) => {
                const item = document.createElement('div');
                item.className = "memo-item flex items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100 gap-3";
                item.innerHTML = `
                    <input type="checkbox" ${memo.done ? 'checked' : ''} 
                        class="w-5 h-5 rounded-md border-slate-300 text-indigo-600 focus:ring-indigo-500 shrink-0 cursor-pointer"
                        onchange="toggleMemo(${index})">
                    <span onclick="openEditModal('${dateKey}', ${index})" 
                        class="flex-1 text-sm cursor-pointer ${memo.done ? 'completed text-slate-400' : 'text-slate-700'} hover:text-indigo-600 transition-colors">${escapeHtml(memo.text)}</span>
                    <button onclick="deleteMemo(${index})" class="text-slate-300 hover:text-red-500 p-1 shrink-0 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    </button>
                `;
                container.appendChild(item);
            });
        }

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function addMemo() {
            const input = document.getElementById('memo-input');
            const text = input.value.trim();
            if (!text) return;
            const dateKey = formatDate(selectedDate);
            if (!memos[dateKey]) memos[dateKey] = [];
            memos[dateKey].push({ text, done: false });
            saveMemos();
            input.value = '';
            renderMemos();
            renderCalendar();
        }

        function formatDateWithDay(dateKey) {
            const [y, m, d] = dateKey.split('-').map(Number);
            const dow = new Date(y, m - 1, d).getDay();
            return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}(${DAY_NAMES[dow]})`;
        }

        function updateDateDisplay() {
            const val = document.getElementById('edit-date-input').value;
            document.getElementById('edit-date-text').textContent = val ? formatDateWithDay(val) : '날짜 선택';
        }

        function shiftEditDate(delta) {
            const input = document.getElementById('edit-date-input');
            if (!input.value) return;
            const [y, m, d] = input.value.split('-').map(Number);
            const date = new Date(y, m - 1, d);
            date.setDate(date.getDate() + delta);
            input.value = formatDate(date);
            updateDateDisplay();
        }

        // 수정 모달 열기
        function openEditModal(dateKey, index) {
            editingDateKey = dateKey;
            editingIndex = index;
            const memo = memos[dateKey][index];
            document.getElementById('edit-text-input').value = memo.text;
            document.getElementById('edit-date-input').value = dateKey;
            updateDateDisplay();
            document.getElementById('edit-modal').classList.add('open');
            setTimeout(() => document.getElementById('edit-text-input').focus(), 100);
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('open');
            editingDateKey = null;
            editingIndex = null;
        }

        function saveEdit() {
            const newText = document.getElementById('edit-text-input').value.trim();
            const newDateKey = document.getElementById('edit-date-input').value;
            if (!newText) { alert('내용을 입력하세요.'); return; }
            if (!newDateKey) { alert('날짜를 선택하세요.'); return; }

            const memo = memos[editingDateKey][editingIndex];
            // 날짜가 바뀐 경우: 이동
            if (newDateKey !== editingDateKey) {
                memos[editingDateKey].splice(editingIndex, 1);
                if (memos[editingDateKey].length === 0) delete memos[editingDateKey];
                if (!memos[newDateKey]) memos[newDateKey] = [];
                memos[newDateKey].push({ text: newText, done: memo.done });
            } else {
                memos[editingDateKey][editingIndex].text = newText;
            }
            saveMemos();
            closeEditModal();
            renderMemos();
            renderCalendar();
        }

        function toggleMemo(index) {
            const dateKey = formatDate(selectedDate);
            memos[dateKey][index].done = !memos[dateKey][index].done;
            saveMemos();
            renderMemos();
            renderCalendar();
        }

        function deleteMemo(index) {
            if (!confirm('이 항목을 삭제하시겠습니까?')) return;
            const dateKey = formatDate(selectedDate);
            memos[dateKey].splice(index, 1);
            if (memos[dateKey].length === 0) delete memos[dateKey];
            saveMemos();
            renderMemos();
            renderCalendar();
        }

        function saveMemos() {
            localStorage.setItem('teacher_daily_memos', JSON.stringify(memos));
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }

        // 내보내기용 텍스트 생성
        function buildExportText() {
            const sortedKeys = Object.keys(memos).sort();
            if (sortedKeys.length === 0) return '저장된 전달사항이 없습니다.';
            return sortedKeys.map(dateKey => {
                const items = memos[dateKey];
                if (!items || items.length === 0) return null;
                const lines = items.map((m, i) => `  ${i + 1}. ${m.text}`).join('\n');
                return `■ ${formatDateKorean(dateKey)}\n${lines}`;
            }).filter(Boolean).join('\n\n');
        }

        // 드로어
        function openDrawer() {
            document.getElementById('drawer').classList.add('open');
            document.getElementById('drawer-overlay').classList.add('open');
            // 미리보기 업데이트
            document.getElementById('export-preview').textContent = buildExportText();
        }

        function closeDrawer() {
            document.getElementById('drawer').classList.remove('open');
            document.getElementById('drawer-overlay').classList.remove('open');
        }

        // 전체 복사
        function copyAll() {
            const text = buildExportText();
            navigator.clipboard.writeText(text).then(() => {
                showToast('클립보드에 복사되었습니다!');
                closeDrawer();
            }).catch(() => {
                // fallback
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast('클립보드에 복사되었습니다!');
                closeDrawer();
            });
        }

        // 이메일 전송 (mailto 방식)
        function sendEmail() {
            const email = document.getElementById('email-input').value.trim();
            if (!email || !email.includes('@')) {
                alert('유효한 이메일 주소를 입력하세요.');
                return;
            }
            const text = buildExportText();
            const subject = encodeURIComponent('담임 전달사항');
            const body = encodeURIComponent(text);
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
            closeDrawer();
        }

        // 토스트 알림
        function showToast(msg) {
            const existing = document.getElementById('toast-msg');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.id = 'toast-msg';
            toast.className = 'fixed bottom-28 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-sm px-5 py-2.5 rounded-full shadow-xl z-50 font-medium';
            toast.style.transition = 'opacity 0.3s';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2000);
        }

        // 초기 렌더
        renderCalendar();
        renderMemos();

        document.getElementById('memo-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addMemo();
        });

        // 수정 모달 배경 클릭 시 닫기
        document.getElementById('edit-modal').addEventListener('click', function(e) {
            if (e.target === this) closeEditModal();
        });
    </script>
</body>
</html>
