<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>담임전달사항</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .completed { text-decoration: line-through; opacity: 0.5; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .dot { width: 4px; height: 4px; background-color: #6366f1; border-radius: 50%; margin: 0 auto; margin-top: 2px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-5 py-4 flex justify-between items-center shrink-0">
        <h1 class="text-xl font-bold text-indigo-600">담임전달사항</h1>
        <div id="current-month-display" class="font-semibold text-slate-700 text-lg">2023.10</div>
    </header>

    <!-- Calendar Section -->
    <section class="bg-white px-4 pb-4 pt-2 shadow-sm shrink-0">
        <div class="flex justify-between items-center mb-2">
            <button onclick="changeMonth(-1)" class="p-2 text-slate-400 hover:text-indigo-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <div class="calendar-grid w-full text-center text-xs font-medium text-slate-400">
                <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
            </div>
            <button onclick="changeMonth(1)" class="p-2 text-slate-400 hover:text-indigo-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>
        </div>
        <div id="calendar-days" class="calendar-grid gap-y-1">
            <!-- Days injected by JS -->
        </div>
    </section>

    <!-- Memo Section -->
    <main class="flex-1 flex flex-col overflow-hidden px-4 py-4 bg-slate-50">
        <div class="flex items-center justify-between mb-3 px-1">
            <h2 id="selected-date-title" class="text-lg font-bold text-slate-800">2023년 10월 27일</h2>
            <span class="text-xs text-slate-400">전달사항 기록</span>
        </div>

        <!-- Memo List -->
        <div id="memo-container" class="flex-1 overflow-y-auto no-scrollbar space-y-3 pb-20">
            <!-- Memo items injected by JS -->
        </div>
    </main>

    <!-- Input Fixed Bottom -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 pb-8 flex gap-2 shadow-[0_-4px_10px_rgba(0,0,0,0.03)]">
        <input type="text" id="memo-input" placeholder="오늘의 전달사항을 입력하세요..." 
            class="flex-1 bg-slate-100 border-none rounded-2xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none text-sm transition-all">
        <button onclick="addMemo()" class="bg-indigo-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center active:scale-95 transition-transform shadow-lg shadow-indigo-200">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        </button>
    </div>

    <script>
        let currentDate = new Date();
        let selectedDate = new Date();
        let memos = JSON.parse(localStorage.getItem('teacher_daily_memos') || '{}');

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function renderCalendar() {
            const daysContainer = document.getElementById('calendar-days');
            const monthDisplay = document.getElementById('current-month-display');
            
            daysContainer.innerHTML = '';
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            monthDisplay.innerText = `${year}.${String(month + 1).padStart(2, '0')}`;

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            // 빈 공간 (이전 달 날짜 공간)
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                daysContainer.appendChild(empty);
            }

            // 날짜 렌더링
            for (let i = 1; i <= lastDate; i++) {
                const dateObj = new Date(year, month, i);
                const dateKey = formatDate(dateObj);
                const isSelected = formatDate(selectedDate) === dateKey;
                const isToday = formatDate(new Date()) === dateKey;
                const hasMemo = memos[dateKey] && memos[dateKey].length > 0;

                const dayEl = document.createElement('div');
                dayEl.className = `h-10 flex flex-col items-center justify-center rounded-xl cursor-pointer transition-all ${
                    isSelected ? 'bg-indigo-600 text-white font-bold' : isToday ? 'text-indigo-600 font-bold' : 'text-slate-600'
                }`;
                dayEl.innerHTML = `
                    <span class="text-sm">${i}</span>
                    ${hasMemo && !isSelected ? '<div class="dot"></div>' : isSelected && hasMemo ? '<div class="dot bg-white"></div>' : '<div class="h-1.5"></div>'}
                `;
                dayEl.onclick = () => {
                    selectedDate = new Date(year, month, i);
                    renderCalendar();
                    renderMemos();
                };
                daysContainer.appendChild(dayEl);
            }
        }

        function renderMemos() {
            const container = document.getElementById('memo-container');
            const title = document.getElementById('selected-date-title');
            const dateKey = formatDate(selectedDate);
            
            title.innerText = `${selectedDate.getFullYear()}년 ${selectedDate.getMonth() + 1}월 ${selectedDate.getDate()}일`;
            container.innerHTML = '';

            const dayMemos = memos[dateKey] || [];

            if (dayMemos.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-10 text-slate-300">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mb-2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                        <p class="text-sm">기록된 사항이 없습니다.</p>
                    </div>
                `;
                return;
            }

            dayMemos.forEach((memo, index) => {
                const item = document.createElement('div');
                item.className = "flex items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100 animate-in slide-in-from-bottom-2 duration-300";
                item.innerHTML = `
                    <input type="checkbox" ${memo.done ? 'checked' : ''} 
                        class="w-6 h-6 rounded-lg border-slate-300 text-indigo-600 focus:ring-indigo-500 mr-3"
                        onchange="toggleMemo(${index})">
                    <span class="flex-1 text-sm ${memo.done ? 'completed text-slate-400' : 'text-slate-700'}">${memo.text}</span>
                    <button onclick="deleteMemo(${index})" class="text-slate-300 hover:text-red-500 p-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    </button>
                `;
                container.appendChild(item);
            });
        }

        function addMemo() {
            const input = document.getElementById('memo-input');
            const text = input.value.trim();
            if (!text) return;

            const dateKey = formatDate(selectedDate);
            if (!memos[dateKey]) memos[dateKey] = [];
            
            memos[dateKey].push({ text, done: false });
            saveMemos();
            input.value = '';
            renderMemos();
            renderCalendar(); // 도트 표시를 위해 달력도 갱신
        }

        function toggleMemo(index) {
            const dateKey = formatDate(selectedDate);
            memos[dateKey][index].done = !memos[dateKey][index].done;
            saveMemos();
            renderMemos();
        }

        function deleteMemo(index) {
            const dateKey = formatDate(selectedDate);
            memos[dateKey].splice(index, 1);
            if (memos[dateKey].length === 0) delete memos[dateKey];
            saveMemos();
            renderMemos();
            renderCalendar();
        }

        function saveMemos() {
            localStorage.setItem('teacher_daily_memos', JSON.stringify(memos));
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }

        // 초기 실행
        renderCalendar();
        renderMemos();

        // 엔터키 지원
        document.getElementById('memo-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addMemo();
        });
    </script>
</body>
</html>
