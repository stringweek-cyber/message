<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>담임전달사항</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .completed { text-decoration: line-through; opacity: 0.45; }
        .progress-ring-container { position: relative; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .progress-ring-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
        .progress-ring-bg { fill: none; stroke: #e2e8f0; stroke-width: 2.5; }
        .progress-ring-fill { fill: none; stroke: #22c55e; stroke-width: 2.5; stroke-linecap: round; transition: stroke-dashoffset 0.4s ease; }
        .progress-ring-fill.all-done { stroke: #16a34a; }
        .day-num { font-size: 13px; line-height: 1; position: relative; z-index: 1; }
        .dot-indicator { width: 4px; height: 4px; border-radius: 50%; background: #ef4444; margin: 1px auto 0; }
        .dot-indicator.white { background: white; }
        .dot-spacer { height: 5px; }
        .day-selected .progress-ring-svg { display: none; }
        .day-selected .day-num-wrap { width: 40px; height: 40px; background: #4f46e5; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; }
        .day-selected .day-num { color: white; font-weight: 700; font-size: 14px; }
        .day-selected .dot-indicator { background: white; }
        .day-today:not(.day-selected) .day-num-wrap { width: 40px; height: 40px; background: #4f46e5; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; }
        .day-today:not(.day-selected) .day-num { color: white !important; font-weight: 700; font-size: 14px; }
        .day-today:not(.day-selected) .dot-indicator { background: white; }
        .today-label { font-size: 9px; font-weight: 700; color: white; line-height: 1; letter-spacing: -0.2px; }
        #drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
        #drawer-overlay.open { opacity: 1; pointer-events: all; }
        #drawer { position: fixed; top: 0; left: -320px; width: 320px; height: 100vh; background: white; z-index: 101; box-shadow: 4px 0 24px rgba(0,0,0,0.12); transition: left 0.28s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; }
        #drawer.open { left: 0; }
        #drawer-content { flex: 1; overflow-y: auto; padding: 16px; }
        #edit-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: center; justify-content: center; padding: 16px; }
        #edit-modal.open { display: flex; }
        #edit-modal-box { background: white; border-radius: 20px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .memo-item { animation: slideUp 0.2s ease forwards; touch-action: none; }
        .memo-item.dragging { opacity: 0.35; background: #e0e7ff !important; border-color: #a5b4fc !important; }
        .memo-item.drag-over { border-top: 2.5px solid #4f46e5 !important; }
        .drag-ghost { position: fixed; pointer-events: none; z-index: 999; border-radius: 16px; box-shadow: 0 8px 32px rgba(79,70,229,0.18); background: white; border: 1.5px solid #a5b4fc; opacity: 0.97; transform: scale(1.03) rotate(-1deg); padding: 12px; font-size: 14px; color: #3730a3; font-weight: 600; display: flex; align-items: center; gap: 8px; max-width: 90vw; }
        @keyframes holdPulse { 0% { box-shadow: 0 0 0 0 rgba(79,70,229,0.3); } 100% { box-shadow: 0 0 0 8px rgba(79,70,229,0); } }
        .memo-item.holding { animation: holdPulse 0.5s ease forwards; border-color: #a5b4fc !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col overflow-hidden">
    <div id="drawer-overlay" onclick="closeDrawer()"></div>
    <div id="drawer">
        <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100">
            <h2 class="text-lg font-bold text-indigo-600">전달사항 내보내기</h2>
            <button onclick="closeDrawer()" class="text-slate-400 p-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div>
        <div id="drawer-content">
            <div class="mb-5">
                <p class="text-sm font-semibold text-slate-600 mb-2">📧 이메일로 전송</p>
                <input type="email" id="email-input" placeholder="이메일 주소 입력" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-400 outline-none mb-2">
                <button onclick="sendEmail()" class="w-full bg-indigo-600 text-white rounded-xl py-2.5 text-sm font-semibold active:scale-95 transition-transform">이메일 전송</button>
            </div>
            <hr class="border-slate-100 mb-5">
            <div class="mb-5">
                <p class="text-sm font-semibold text-slate-600 mb-2">📋 전체 내용 복사</p>
                <button onclick="copyAll()" class="w-full bg-slate-100 text-slate-700 rounded-xl py-2.5 text-sm font-semibold active:scale-95 transition-all">클립보드에 복사</button>
            </div>
            <hr class="border-slate-100 mb-4">
            <div>
                <p class="text-sm font-semibold text-slate-600 mb-2">📄 내용 미리보기</p>
                <div id="export-preview" class="bg-slate-50 rounded-xl p-3 text-xs text-slate-600 whitespace-pre-wrap leading-relaxed max-h-80 overflow-y-auto border border-slate-100"></div>
            </div>
        </div>
    </div>
    <div id="edit-modal">
        <div id="edit-modal-box">
            <h3 class="text-base font-bold text-slate-800 mb-4">전달사항 수정</h3>
            <textarea id="edit-text-input" rows="3" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-400 outline-none resize-none mb-3"></textarea>
            <div class="mb-4">
                <div class="flex items-center justify-between mb-1.5">
                    <label class="text-xs font-semibold text-slate-500">날짜 변경</label>
                    <div class="flex items-center gap-1">
                        <button onclick="shiftEditDate(-1)" class="w-7 h-7 rounded-lg bg-slate-100 flex items-center justify-center text-slate-500 active:scale-95">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                        </button>
                        <button onclick="shiftEditDate(1)" class="w-7 h-7 rounded-lg bg-indigo-100 flex items-center justify-center text-indigo-600 active:scale-95">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                        </button>
                    </div>
                </div>
                <input type="date" id="edit-date-input" class="sr-only" onchange="updateDateDisplay()">
                <div id="edit-date-display" onclick="document.getElementById('edit-date-input').showPicker()" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-700 bg-white cursor-pointer flex items-center justify-between hover:border-indigo-400 transition-colors">
                    <span id="edit-date-text">날짜 선택</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-400"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="closeEditModal()" class="flex-1 bg-slate-100 text-slate-600 rounded-xl py-2.5 text-sm font-semibold">취소</button>
                <button onclick="saveEdit()" class="flex-1 bg-indigo-600 text-white rounded-xl py-2.5 text-sm font-semibold">저장</button>
            </div>
        </div>
    </div>
    <header class="bg-white border-b border-slate-200 px-4 py-3.5 flex items-center shrink-0">
        <button onclick="openDrawer()" class="mr-3 p-1.5 text-slate-500 hover:text-indigo-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="text-xl font-bold text-indigo-600 flex-1">담임전달사항</h1>
        <div id="current-month-display" class="font-semibold text-slate-700 text-base"></div>
    </header>
    <section class="bg-white px-3 pb-3 pt-2 shadow-sm shrink-0">
        <div class="flex items-center mb-1">
            <button onclick="changeMonth(-1)" class="p-2 text-slate-400 hover:text-indigo-600 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <div class="calendar-grid flex-1 text-center">
                <div class="text-xs font-bold text-red-500 py-1">일</div>
                <div class="text-xs font-bold text-slate-500 py-1">월</div>
                <div class="text-xs font-bold text-slate-500 py-1">화</div>
                <div class="text-xs font-bold text-slate-500 py-1">수</div>
                <div class="text-xs font-bold text-slate-500 py-1">목</div>
                <div class="text-xs font-bold text-slate-500 py-1">금</div>
                <div class="text-xs font-bold text-blue-500 py-1">토</div>
            </div>
            <button onclick="changeMonth(1)" class="p-2 text-slate-400 hover:text-indigo-600 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>
        </div>
        <div class="flex items-start">
            <div style="width:38px;"></div>
            <div id="calendar-days" class="calendar-grid flex-1 gap-y-1"></div>
            <div style="width:38px;"></div>
        </div>
    </section>
    <main class="flex-1 flex flex-col overflow-hidden px-4 py-4 bg-slate-50">
        <div class="flex items-center justify-between mb-3 px-1">
            <h2 id="selected-date-title" class="text-base font-bold text-slate-800">날짜 선택</h2>
            <span class="text-xs text-slate-400">꾹 눌러서 순서 변경</span>
        </div>
        <div id="memo-container" class="flex-1 overflow-y-auto no-scrollbar space-y-2.5 pb-24"></div>
    </main>
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 pb-6 flex gap-2 shadow-[0_-4px_16px_rgba(0,0,0,0.06)]" style="z-index:50;">
        <input type="text" id="memo-input" placeholder="오늘의 전달사항을 입력하세요..." class="flex-1 bg-slate-100 border-none rounded-2xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none text-sm transition-all">
        <button onclick="addMemo()" class="bg-indigo-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center active:scale-95 transition-transform shadow-lg shadow-indigo-200 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        </button>
    </div>
    <script>
        let currentDate = new Date();
        let selectedDate = new Date();
        let memos = JSON.parse(localStorage.getItem('teacher_daily_memos') || '{}');
        const DAY_NAMES = ['일','월','화','수','목','금','토'];
        let editingDateKey = null, editingIndex = null;
        let dragSrcIndex = null, dragGhost = null, holdTimer = null;
        let isDragging = false, lastOverIndex = null;

        function formatDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        function formatDateKorean(s) { const [y,m,d]=s.split('-').map(Number); return `${y}년 ${m}월 ${d}일(${DAY_NAMES[new Date(y,m-1,d).getDay()]})`; }
        function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

        function createProgressRing(total, done, isSelected, isToday, dayNum, dow) {
            const r=17, c=2*Math.PI*r, off=c-(total>0?done/total:0)*c, allDone=total>0&&done===total;
            let nc='text-slate-600'; if(dow===0) nc='text-red-500'; else if(dow===6) nc='text-blue-500';
            const sc=isSelected?'day-selected':'', tc=isToday&&!isSelected?'day-today':'', hm=total>0;
            return `<div class="progress-ring-container ${sc} ${tc}" onclick="selectDay(${dayNum})">
                ${hm&&!isSelected&&!isToday?`<svg class="progress-ring-svg" width="40" height="40" viewBox="0 0 40 40"><circle class="progress-ring-bg" cx="20" cy="20" r="${r}"/><circle class="progress-ring-fill ${allDone?'all-done':''}" cx="20" cy="20" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${off}"/></svg>`:''}
                ${(isSelected||isToday)?`<div class="day-num-wrap">${isToday?'<span class="today-label">오늘</span>':''}<span class="day-num">${dayNum}</span>${hm?'<div class="dot-indicator white"></div>':'<div class="dot-spacer"></div>'}</div>`
                :`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;"><span class="day-num ${nc}">${dayNum}</span>${hm?'<div class="dot-indicator"></div>':'<div class="dot-spacer"></div>'}</div>`}
            </div>`;
        }

        function renderCalendar() {
            const dc=document.getElementById('calendar-days'), md=document.getElementById('current-month-display');
            dc.innerHTML=''; const y=currentDate.getFullYear(), m=currentDate.getMonth();
            md.innerText=`${y}.${String(m+1).padStart(2,'0')}`;
            const firstDay=new Date(y,m,1).getDay(), lastDate=new Date(y,m+1,0).getDate();
            for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.style.height='44px';dc.appendChild(e);}
            const tk=formatDate(new Date());
            for(let i=1;i<=lastDate;i++){
                const dobj=new Date(y,m,i), dow=dobj.getDay(), dk=formatDate(dobj);
                const isSel=formatDate(selectedDate)===dk, isTod=tk===dk, dm=memos[dk]||[];
                const cell=document.createElement('div'); cell.style.cssText='height:44px;display:flex;align-items:center;justify-content:center;';
                cell.innerHTML=createProgressRing(dm.length,dm.filter(x=>x.done).length,isSel,isTod,i,dow);
                dc.appendChild(cell);
            }
        }
        function selectDay(day) { selectedDate=new Date(currentDate.getFullYear(),currentDate.getMonth(),day); renderCalendar(); renderMemos(); }

        function renderMemos() {
            const container=document.getElementById('memo-container');
            const title=document.getElementById('selected-date-title');
            const dk=formatDate(selectedDate);
            title.innerText=`${selectedDate.getFullYear()}년 ${selectedDate.getMonth()+1}월 ${selectedDate.getDate()}일`;
            container.innerHTML='';
            const dm=memos[dk]||[];
            if(dm.length===0){ container.innerHTML=`<div class="flex flex-col items-center justify-center py-10 text-slate-300"><svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mb-2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg><p class="text-sm">기록된 사항이 없습니다.</p></div>`; return; }
            dm.forEach((memo, index) => {
                const item=document.createElement('div'); const liked=memo.liked||false;
                item.className=`memo-item flex items-center p-3 rounded-2xl shadow-sm border gap-3 transition-colors duration-150 ${liked?'bg-red-50 border-red-100':'bg-white border-slate-100'}`;
                item.dataset.index=index;
                item.innerHTML=`
                    <div class="drag-handle shrink-0 cursor-grab px-0.5 py-1 text-slate-300 select-none">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/>
                            <circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/>
                            <circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/>
                        </svg>
                    </div>
                    <input type="checkbox" ${memo.done?'checked':''} class="w-5 h-5 rounded-md border-slate-300 text-indigo-600 shrink-0 cursor-pointer" onchange="toggleMemo(${index})">
                    <span onclick="openEditModal('${dk}',${index})" class="flex-1 text-sm cursor-pointer ${memo.done?'completed text-slate-400':'text-slate-700'} leading-snug">${escapeHtml(memo.text)}</span>
                    <button onclick="toggleLike(${index})" class="p-1 shrink-0 active:scale-125 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="${liked?'#f87171':'none'}" stroke="${liked?'#f87171':'#cbd5e1'}"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    </button>
                    <button onclick="deleteMemo(${index})" class="text-slate-300 hover:text-red-500 p-1 shrink-0 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    </button>`;
                const handle=item.querySelector('.drag-handle');
                handle.addEventListener('touchstart', e=>onTouchStart(e,item,index), {passive:false});
                handle.addEventListener('mousedown', e=>onMouseDown(e,item,index));
                container.appendChild(item);
            });
            container.addEventListener('touchmove', onTouchMove, {passive:false});
            container.addEventListener('touchend', onTouchEnd);
            container.addEventListener('touchcancel', onTouchEnd);
        }

        function onTouchStart(e, item, index) {
            holdTimer=setTimeout(()=>startDrag(item,index,e.touches[0].clientX,e.touches[0].clientY), 400);
            item.classList.add('holding');
            item.addEventListener('touchend',()=>{clearTimeout(holdTimer);item.classList.remove('holding');},{once:true});
        }
        function onMouseDown(e, item, index) {
            e.preventDefault();
            holdTimer=setTimeout(()=>startDrag(item,index,e.clientX,e.clientY), 400);
            item.classList.add('holding');
            const up=()=>{clearTimeout(holdTimer);item.classList.remove('holding');document.removeEventListener('mouseup',up);};
            document.addEventListener('mouseup',up);
        }
        function startDrag(item, index, cx, cy) {
            isDragging=true; dragSrcIndex=index;
            item.classList.remove('holding'); item.classList.add('dragging');
            const rect=item.getBoundingClientRect();
            dragGhost=document.createElement('div'); dragGhost.className='drag-ghost';
            dragGhost.style.width=rect.width+'px'; dragGhost.style.top=(cy-rect.height/2)+'px'; dragGhost.style.left=rect.left+'px';
            const memo=memos[formatDate(selectedDate)][index];
            dragGhost.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="#a5b4fc"><circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/></svg><span>${escapeHtml(memo.text)}</span>`;
            document.body.appendChild(dragGhost);
            if(navigator.vibrate) navigator.vibrate(30);
        }
        function onTouchMove(e) { if(!isDragging) return; e.preventDefault(); const t=e.touches[0]; moveGhost(t.clientX,t.clientY); updateDropTarget(t.clientY); }
        function onTouchEnd(e) { if(!isDragging) return; const t=e.changedTouches?e.changedTouches[0]:null; endDrag(t?t.clientY:null); }
        document.addEventListener('mousemove',e=>{if(!isDragging) return; moveGhost(e.clientX,e.clientY); updateDropTarget(e.clientY);});
        document.addEventListener('mouseup',e=>{if(!isDragging) return; endDrag(e.clientY);});

        function moveGhost(cx, cy) { if(!dragGhost) return; dragGhost.style.top=(cy-dragGhost.offsetHeight/2)+'px'; }
        function updateDropTarget(clientY) {
            const container=document.getElementById('memo-container');
            const items=[...container.querySelectorAll('.memo-item:not(.dragging)')];
            container.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
            lastOverIndex=null;
            for(let i=0;i<items.length;i++){
                const rect=items[i].getBoundingClientRect();
                if(clientY<rect.top+rect.height/2){ items[i].classList.add('drag-over'); lastOverIndex=parseInt(items[i].dataset.index); break; }
            }
        }
        function endDrag(clientY) {
            isDragging=false;
            if(dragGhost){dragGhost.remove();dragGhost=null;}
            const container=document.getElementById('memo-container');
            container.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
            container.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging'));
            if(dragSrcIndex===null){dragSrcIndex=null;return;}
            const dk=formatDate(selectedDate), arr=memos[dk];
            if(!arr){dragSrcIndex=null;return;}
            let targetIndex=lastOverIndex===null?arr.length:lastOverIndex;
            if(targetIndex!==dragSrcIndex&&targetIndex!==dragSrcIndex+1){
                const item=arr.splice(dragSrcIndex,1)[0];
                let insertAt=targetIndex; if(targetIndex>dragSrcIndex) insertAt--;
                arr.splice(insertAt,0,item);
                saveMemos(); if(navigator.vibrate) navigator.vibrate(20);
            }
            dragSrcIndex=null; lastOverIndex=null;
            renderMemos(); renderCalendar();
        }

        function addMemo(){const input=document.getElementById('memo-input'),text=input.value.trim();if(!text)return;const dk=formatDate(selectedDate);if(!memos[dk])memos[dk]=[];memos[dk].push({text,done:false});saveMemos();input.value='';renderMemos();renderCalendar();}
        function toggleMemo(i){const dk=formatDate(selectedDate);memos[dk][i].done=!memos[dk][i].done;saveMemos();renderMemos();renderCalendar();}
        function toggleLike(i){const dk=formatDate(selectedDate);memos[dk][i].liked=!memos[dk][i].liked;saveMemos();renderMemos();}
        function deleteMemo(i){if(!confirm('이 항목을 삭제하시겠습니까?'))return;const dk=formatDate(selectedDate);memos[dk].splice(i,1);if(memos[dk].length===0)delete memos[dk];saveMemos();renderMemos();renderCalendar();}
        function saveMemos(){localStorage.setItem('teacher_daily_memos',JSON.stringify(memos));}
        function changeMonth(d){currentDate.setMonth(currentDate.getMonth()+d);renderCalendar();}

        function formatDateWithDay(dk){const [y,m,d]=dk.split('-').map(Number);return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}(${DAY_NAMES[new Date(y,m-1,d).getDay()]})`;}
        function updateDateDisplay(){const v=document.getElementById('edit-date-input').value;document.getElementById('edit-date-text').textContent=v?formatDateWithDay(v):'날짜 선택';}
        function shiftEditDate(delta){const input=document.getElementById('edit-date-input');if(!input.value)return;const [y,m,d]=input.value.split('-').map(Number),date=new Date(y,m-1,d);date.setDate(date.getDate()+delta);input.value=formatDate(date);updateDateDisplay();}
        function openEditModal(dk,index){editingDateKey=dk;editingIndex=index;const memo=memos[dk][index];document.getElementById('edit-text-input').value=memo.text;document.getElementById('edit-date-input').value=dk;updateDateDisplay();document.getElementById('edit-modal').classList.add('open');setTimeout(()=>document.getElementById('edit-text-input').focus(),100);}
        function closeEditModal(){document.getElementById('edit-modal').classList.remove('open');editingDateKey=null;editingIndex=null;}
        function saveEdit(){const newText=document.getElementById('edit-text-input').value.trim(),newDk=document.getElementById('edit-date-input').value;if(!newText){alert('내용을 입력하세요.');return;}if(!newDk){alert('날짜를 선택하세요.');return;}const memo=memos[editingDateKey][editingIndex];if(newDk!==editingDateKey){memos[editingDateKey].splice(editingIndex,1);if(memos[editingDateKey].length===0)delete memos[editingDateKey];if(!memos[newDk])memos[newDk]=[];memos[newDk].push({text:newText,done:memo.done});}else{memos[editingDateKey][editingIndex].text=newText;}saveMemos();closeEditModal();renderMemos();renderCalendar();}

        function buildExportText(){const keys=Object.keys(memos).sort();if(!keys.length)return '저장된 전달사항이 없습니다.';return keys.map(dk=>{const items=memos[dk];if(!items||!items.length)return null;return `■ ${formatDateKorean(dk)}\n${items.map((m,i)=>`  ${i+1}. ${m.text}`).join('\n')}`;}).filter(Boolean).join('\n\n');}
        function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawer-overlay').classList.add('open');document.getElementById('export-preview').textContent=buildExportText();}
        function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open');}
        function copyAll(){const text=buildExportText();navigator.clipboard.writeText(text).then(()=>{showToast('클립보드에 복사되었습니다!');closeDrawer();}).catch(()=>{const el=document.createElement('textarea');el.value=text;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);showToast('클립보드에 복사되었습니다!');closeDrawer();});}
        function sendEmail(){const email=document.getElementById('email-input').value.trim();if(!email||!email.includes('@')){alert('유효한 이메일 주소를 입력하세요.');return;}window.location.href=`mailto:${email}?subject=${encodeURIComponent('담임 전달사항')}&body=${encodeURIComponent(buildExportText())}`;closeDrawer();}
        function showToast(msg){const ex=document.getElementById('toast-msg');if(ex)ex.remove();const t=document.createElement('div');t.id='toast-msg';t.className='fixed bottom-28 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-sm px-5 py-2.5 rounded-full shadow-xl z-50 font-medium';t.style.transition='opacity 0.3s';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},2000);}

        renderCalendar(); renderMemos();
        document.getElementById('memo-input').addEventListener('keypress',e=>{if(e.key==='Enter')addMemo();});
        document.getElementById('edit-modal').addEventListener('click',function(e){if(e.target===this)closeEditModal();});
    </script>
</body>
</html>
